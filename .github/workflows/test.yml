name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-tests:
    name: Rust lib tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Ubuntu runners ship with ~25GB of pre-installed SDKs we don't need.
      # DuckDB's bundled C++ build can fill the disk during `cargo check`
      # (the .a archive alone is multi-GB). Free space up front.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /usr/local/lib/android
          df -h /

      - name: Install Linux build deps (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Tauri's build script validates externalBin paths exist at compile
      # time. The real sidecar is packaged by a separate pipeline (release
      # builds only) — in CI we stub it so cargo check/test can proceed.
      - name: Stub externalBin sidecar (CI only)
        run: |
          mkdir -p sidecar/dist
          touch sidecar/dist/markitdown-sidecar-x86_64-unknown-linux-gnu
          chmod +x sidecar/dist/markitdown-sidecar-x86_64-unknown-linux-gnu

      # --lib so we skip bin tests (no main binary tests exist).
      - name: Run lib tests
        run: |
          cd src-tauri
          cargo test --lib --no-default-features

      - name: Cargo check (all targets)
        run: |
          cd src-tauri
          cargo check --no-default-features

  frontend-typecheck:
    name: TypeScript compile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type-check
        run: pnpm exec tsc --noEmit
