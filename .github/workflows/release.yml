name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.5.0). If unset, uses the triggering tag."
        required: false

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: --target aarch64-apple-darwin
            label: "macOS (Apple Silicon)"
            pdfium_target: mac-arm64
            pandoc_target: arm64-macOS
          - platform: macos-14
            args: --target x86_64-apple-darwin
            label: "macOS (Intel)"
            # macos-14 runners are arm64 hosts; override TARGET so we
            # fetch the x86_64 binaries for the cross-compiled
            # artifact rather than what auto-detect would pick.
            pdfium_target: mac-x64
            pandoc_target: x86_64-macOS
          - platform: ubuntu-22.04
            args: ""
            label: "Linux"
            pdfium_target: linux-x64
            pandoc_target: linux-amd64
          - platform: windows-latest
            args: ""
            label: "Windows"
            pdfium_target: win-x64
            pandoc_target: windows-x86_64

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libxdo-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: pnpm install --frozen-lockfile

      # The Python markitdown sidecar (179 MB per platform) was
      # replaced by the in-process `mdkit` Rust crate. See
      # src-tauri/src/scanner.rs for the dispatch surface.

      # Fetch libpdfium for the build target. mdkit's PDF backend
      # loads `libpdfium.dylib` / `libpdfium.so` / `pdfium.dll` at
      # runtime; the file is bundled into the Tauri app via
      # `tauri.conf.json` `bundle.resources`. The committed copy in
      # the repo is macOS arm64 (the dev team's primary target);
      # CI overwrites it with the per-target binary before bundling.
      - name: Fetch libpdfium
        shell: bash
        env:
          TARGET: ${{ matrix.pdfium_target }}
        run: scripts/fetch-libpdfium.sh --force

      # Same fetch pattern for pandoc — bundled into
      # `src-tauri/resources/pandoc/` and loaded by mdkit's
      # PandocExtractor::with_binary when system PATH discovery
      # fails. ~150 MB per platform; user-visible bundle size
      # tradeoff was made deliberately (correctness over size).
      - name: Fetch pandoc
        shell: bash
        env:
          TARGET: ${{ matrix.pandoc_target }}
        run: scripts/fetch-pandoc.sh --force

      # Apple code-signing + notarization is OPTIONAL. When
      # APPLE_CERTIFICATE is uploaded as a GitHub Secret, this step
      # writes all six APPLE_* env vars to $GITHUB_ENV; tauri-action
      # picks them up and signs + notarizes automatically. When the
      # secret is unset (current state — no Apple Developer account
      # yet), this step is skipped, the env vars are never set, and
      # tauri-action skips codesign — producing an unsigned but
      # functional .app. Users hit Gatekeeper on first launch and
      # follow the documented override flow at sery.ai/docs.
      # GitHub Actions disallows `secrets` directly in step-level
      # `if:` conditions (workflow fails to parse). Standard pattern:
      # expose the secret via `env:`, then check `env.X` in `if:`.
      - name: Configure Apple signing (skipped if APPLE_CERTIFICATE is unset)
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        if: env.APPLE_CERTIFICATE != ''
        shell: bash
        run: |
          {
            echo "APPLE_CERTIFICATE=$APPLE_CERTIFICATE"
            echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD"
            echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY"
            echo "APPLE_ID=$APPLE_ID"
            echo "APPLE_PASSWORD=$APPLE_PASSWORD"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
          } >> "$GITHUB_ENV"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Embedded into the binary at compile time via Rust
          # `option_env!()` in src-tauri/src/gdrive_oauth.rs. If unset
          # (e.g. fork builds without the secret), the Drive panel
          # surfaces a "not configured for this build" message
          # instead of a connect button. See
          # datalake/SETUP_GOOGLE_OAUTH.md.
          #
          # Both the client_id AND client_secret are baked in. Despite
          # the name, Google's docs are explicit that the "secret" for
          # installed apps is not confidential (RFC 8252 §8.5).
          # Google's /token endpoint nevertheless requires it for
          # Desktop-app OAuth clients — even with PKCE — or rejects
          # with `invalid_request: client_secret is missing`.
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          # F48 — Dropbox app key, baked in via option_env! in
          # src-tauri/src/dropbox_oauth.rs. Builds without the
          # secret leave the OAuth tab functional but surface a
          # "not configured" error when the user clicks "Open
          # Dropbox" — PAT auth still works as the fallback.
          # See datalake/SETUP_DROPBOX_OAUTH.md.
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          # F49 — Microsoft Entra app client ID for OneDrive's
          # device-code OAuth, baked in via option_env! in
          # src-tauri/src/onedrive.rs. Builds without the secret
          # leave OneDrive completely non-functional (no PAT
          # fallback for Microsoft). See
          # datalake/SETUP_MICROSOFT_OAUTH.md.
          MICROSOFT_CLIENT_ID: ${{ secrets.MICROSOFT_CLIENT_ID }}
          # APPLE_* env vars are inherited from $GITHUB_ENV (set by
          # the conditional step above) — present only when an
          # Apple cert is configured.
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: "Sery Link __VERSION__"
          releaseBody: |
            See [CHANGELOG.md](https://github.com/seryai/sery-link/blob/main/CHANGELOG.md) for the full list of changes.

            ## Install

            - **macOS**: download `Sery-Link_*.dmg` (Apple Silicon or Intel), open, drag to Applications.
            - **Windows**: download `Sery-Link_*_x64-setup.exe` or the `.msi` installer.
            - **Linux**: download the `.AppImage` (portable) or `.deb` (Debian/Ubuntu).

            Existing users on a previous version will be prompted to auto-update.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
